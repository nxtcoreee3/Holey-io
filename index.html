<style>
#nxtcoreee3-notification {
  position: fixed;
  top: -120px;

  color: white;

  z-index: 999999;
  transition: top 0.5s ease;
}

#nxtcoreee3-notification img {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  object-fit: cover;
}
</style>

}, 5300);
